# Alembic配置文件 — QuantMind V2
# sqlalchemy.url由env.py从settings动态注入，此处留空占位

[alembic]
# 迁移脚本目录（相对于本文件所在目录）
script_location = alembic

# 迁移文件命名格式: 时间戳_描述
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path追加（env.py已处理，此处备用）
prepend_sys_path = .

# 时区（用于迁移文件时间戳）
timezone = Asia/Shanghai

# 是否截断长注释
truncate_slug_length = 40

# 版本文件存放目录
version_locations = %(here)s/versions

# 输出编码
output_encoding = utf-8

# sqlalchemy.url由env.py动态设置，这里留空
sqlalchemy.url =


[post_write_hooks]
# ruff格式化新生成的迁移文件
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
