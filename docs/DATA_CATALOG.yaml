# ============================================================
# 铁律对齐索引
# ============================================================
iron_laws_index:
  4: 中性化后IC必须并列展示 → factor_values_neutral + factor_values_raw
  7: 数据地基一致 → Universe类 + stock_status_daily
  11: IC必须入库 → factor_ic_history
  14: 回测引擎不清洗 → L1 入库时完成, DataPipeline
  15: 回测可复现 → backtest_run + factor_compute_version
  16: 信号路径唯一 → 所有消费走 DataOrchestrator
  17: 入库走 DataPipeline → 所有 contract.py 登记表
  19: IC 口径统一 → ic_calculator.compute_forward_excess_returns
  20: 因子鲁棒性 → G_robust (scripts/research/noise_robustness.py)
  29: 不写 float NaN → DataPipeline + factor_compute_service
  31: Engine 纯计算 → factor_engine/ 不含 IO
  32: Service 不 commit → services/ 层事务由调用方管理
  34: 配置 SSoT → config_guard
