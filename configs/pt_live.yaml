# QuantMind V2 Paper Trading 生产配置
# 所有策略级参数的唯一来源（替代散落在.env/config.py/signal_engine中的配置）

strategy:
  name: equal_weight_top20
  factors:
    - {name: turnover_mean_20, direction: -1}
    - {name: volatility_20, direction: -1}
    - {name: reversal_20, direction: 1}
    - {name: amihud_20, direction: 1}
    - {name: bp_ratio, direction: 1}
  compose: equal_weight
  top_n: 20
  rebalance_freq: monthly
  industry_cap: 1.0       # 无行业约束(1.0=不限)
  turnover_cap: 0.5       # 单次换手率上限50%
  cash_buffer: 0.03       # 3%现金缓冲

execution:
  mode: paper             # paper / live / backtest
  slippage:
    mode: volume_impact   # volume_impact / fixed
    config:
      Y_large: 0.8       # Bouchaud大盘系数
      Y_mid: 1.0
      Y_small: 1.5
      base_bps_large: 3.0
      base_bps_mid: 5.0
      base_bps_small: 8.0
      sell_penalty: 1.2
      gap_penalty_factor: 0.5
  costs:
    commission_rate: 0.0000854   # 佣金万0.854(国金证券)
    min_commission: 5.0          # 最低佣金5元
    stamp_tax: historical        # historical(2023-08-28前0.1%后0.05%) / fixed(0.05%)
    stamp_tax_rate: 0.0005       # fixed模式税率
    transfer_fee_rate: 0.00001   # 过户费万0.1
  pms:
    enabled: true
    exec_mode: same_close        # same_close / next_open
    tiers:
      - {gain: 0.30, drawdown: 0.15}   # L1: 盈利>30%且回撤>15%
      - {gain: 0.20, drawdown: 0.12}   # L2: 盈利>20%且回撤>12%
      - {gain: 0.10, drawdown: 0.10}   # L3: 盈利>10%且回撤>10%

universe:
  exclude_st: true
  exclude_bj: true
  exclude_suspended: true
  exclude_new_stock: true
  min_listing_days: 60

backtest:
  initial_capital: 1000000
  benchmark: "000300.SH"
  lot_size: 100
  volume_cap_pct: 0.10          # 单笔不超过日成交额10%
