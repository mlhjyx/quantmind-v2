# MVP 4.1 batch 2.2 — AlertRulesEngine 默认规则集.
#
# 用法:
#   from qm_platform.observability import AlertRulesEngine
#   engine = AlertRulesEngine.from_yaml("configs/alert_rules.yaml")
#   rule = engine.match(alert)  # 顺序匹配, 第一个 match 即返
#
# 规则匹配语义:
#   - rules 顺序敏感 (具体规则放前面, 通配放后面)
#   - match 字段 ALL 满足才匹配 (AND), 缺字段视通配
#   - dedup_key_template 占位符 {field} 从 alert.details 取值, {source}/{severity} 顶层
#
# 17 schtask scripts 迁 SDK (batch 3) 时, caller 走:
#   rule = engine.match(alert)
#   router.fire(alert,
#               dedup_key=rule.format_dedup_key(alert) if rule else <fallback>,
#               suppress_minutes=rule.suppress_minutes if rule else None)
#
# 维护原则:
#   - 新增源前必加显式规则 (不允许全部走通配 fallback)
#   - severity 改后必同步本文件
#   - PR 加规则必含: dedup_key_template 设计 reasoning + 实测 caller 端可生成场景

rules:
  # ────────────── P0 真金 (PT 生产) ──────────────
  - name: p0_intraday_portfolio_drop
    match:
      severity: p0
      source: intraday_monitor
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      dedup_key_template: "intraday:portfolio_drop:cb_l{cb_level}"

  - name: p0_data_quality_pre_signal
    match:
      severity: p0
      source: data_quality_check
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      dedup_key_template: "data_quality:summary:{trade_date}"

  - name: p1_data_quality_pre_signal
    match:
      severity: p1
      source: data_quality_check
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "data_quality:summary:{trade_date}"

  - name: p0_pt_audit_findings
    match:
      severity: p0
      source: pt_audit
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.2: pt_audit aggregates 1 message per audit run (5 checks 合并). dedup_key
      # 用 summary:{trade_date} 与 batch 3.1 data_quality 模式一致, 防 schtask 风暴.
      # 旧 {check}:{trade_date} 设计需 5 message 拆, 与 send_aggregated_alert 1 message
      # 行为不符.
      dedup_key_template: "pt_audit:summary:{trade_date}"

  - name: p1_pt_audit_findings
    match:
      severity: p1
      source: pt_audit
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "pt_audit:summary:{trade_date}"

  - name: p2_pt_audit_findings
    match:
      severity: p2
      source: pt_audit
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "pt_audit:summary:{trade_date}"

  # ────────────── P1 因子 / 健康 ──────────────
  - name: p1_factor_lifecycle_warning
    match:
      severity: p1
      source: factor_lifecycle_monitor
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "factor_lifecycle:{factor}:{transition}"

  - name: p1_factor_health_decay
    match:
      severity: p1
      source: factor_health_daily
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "factor_health:{factor}:{issue}"

  - name: p1_pt_daily_summary
    match:
      severity: p1
      source: pt_daily_summary
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "pt_daily_summary:{trade_date}"

  - name: p0_pt_watchdog_stale
    match:
      severity: p0
      source: pt_watchdog
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.4: pt_watchdog send_alert 全 P0 (PT 真金链路异常). 1 message per
      # script run, summary dedup 与 batch 3.x 一致, 防同日多次空跑风暴.
      dedup_key_template: "pt_watchdog:summary:{trade_date}"

  - name: p1_pt_watchdog_stale
    match:
      severity: p1
      source: pt_watchdog
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "pt_watchdog:summary:{trade_date}"

  - name: p0_ic_monitor_reversal
    match:
      severity: p0
      source: ic_monitor
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.3: ic_monitor 1 message per run (multiple factor alerts 聚合).
      # summary:{trade_date} 与 batch 3.1/3.2 模式一致, 防同日多次空跑风暴.
      dedup_key_template: "ic_monitor:summary:{trade_date}"

  - name: p1_ic_monitor_drop
    match:
      severity: p1
      source: ic_monitor
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "ic_monitor:summary:{trade_date}"

  - name: p0_monitor_factor_ic_retired
    match:
      severity: p0
      source: monitor_factor_ic
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.3: 因子生命周期 (retired = P0 严重衰减) 1 message per run.
      dedup_key_template: "monitor_factor_ic:summary:{trade_date}"

  - name: p1_monitor_factor_ic_warning
    match:
      severity: p1
      source: monitor_factor_ic
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "monitor_factor_ic:summary:{trade_date}"

  - name: info_monitor_factor_ic_health
    match:
      severity: info
      source: monitor_factor_ic
    action:
      channels: [dingtalk]
      suppress_minutes: 1440  # 24h, 健康播报 daily 1 次足够
      # P2.1 reviewer 采纳: 不能与 P0/P1 共享 summary 键 — INFO 1440min suppress 会
      # 毒化同日 P0 retired 告警 (dedup 命中 INFO 已写的 row, 真金 P0 silent 24h).
      # 用独立 health 命名空间隔离, P0/P1 走 summary 命名空间.
      dedup_key_template: "monitor_factor_ic:health:{trade_date}"

  - name: p1_daily_reconciliation_drift
    match:
      severity: p1
      source: daily_reconciliation
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "daily_reconciliation:{trade_date}:{check}"

  # ────────────── P2 研究 / GP / 长任务 ──────────────
  - name: p2_rolling_wf_regression
    match:
      severity: p2
      source: rolling_wf
    action:
      channels: [dingtalk]
      suppress_minutes: 1440  # 24h, 周度任务 dedup
      dedup_key_template: "rolling_wf:{check}:weekly"

  - name: p2_gp_pipeline_failed
    match:
      severity: p2
      source: run_gp_pipeline
    action:
      channels: [dingtalk]
      suppress_minutes: 1440
      dedup_key_template: "gp_pipeline:{phase}:{exception_type}"

  - name: p2_services_healthcheck_degraded
    match:
      severity: p2
      source: services_healthcheck
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "services_healthcheck:{service}:{check}"

  # ────────────── 通配 fallback (按 severity 兜底) ──────────────
  - name: catchall_p0
    match:
      severity: p0
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      dedup_key_template: "catchall:{source}:p0"

  - name: catchall_p1
    match:
      severity: p1
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "catchall:{source}:p1"

  - name: catchall_p2
    match:
      severity: p2
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "catchall:{source}:p2"
