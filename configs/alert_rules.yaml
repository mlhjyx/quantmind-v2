# MVP 4.1 batch 2.2 — AlertRulesEngine 默认规则集.
#
# 用法:
#   from qm_platform.observability import AlertRulesEngine
#   engine = AlertRulesEngine.from_yaml("configs/alert_rules.yaml")
#   rule = engine.match(alert)  # 顺序匹配, 第一个 match 即返
#
# 规则匹配语义:
#   - rules 顺序敏感 (具体规则放前面, 通配放后面)
#   - match 字段 ALL 满足才匹配 (AND), 缺字段视通配
#   - dedup_key_template 占位符 {field} 从 alert.details 取值, {source}/{severity} 顶层
#
# 17 schtask scripts 迁 SDK (batch 3) 时, caller 走:
#   rule = engine.match(alert)
#   router.fire(alert,
#               dedup_key=rule.format_dedup_key(alert) if rule else <fallback>,
#               suppress_minutes=rule.suppress_minutes if rule else None)
#
# 维护原则:
#   - 新增源前必加显式规则 (不允许全部走通配 fallback)
#   - severity 改后必同步本文件
#   - PR 加规则必含: dedup_key_template 设计 reasoning + 实测 caller 端可生成场景

rules:
  # ────────────── P0 真金 (PT 生产) ──────────────
  - name: p0_intraday_portfolio_drop
    match:
      severity: p0
      source: intraday_monitor
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      dedup_key_template: "intraday:portfolio_drop:cb_l{cb_level}"

  - name: p0_data_quality_pre_signal
    match:
      severity: p0
      source: data_quality_check
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      dedup_key_template: "data_quality:summary:{trade_date}"

  - name: p1_data_quality_pre_signal
    match:
      severity: p1
      source: data_quality_check
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "data_quality:summary:{trade_date}"

  - name: p0_pt_audit_findings
    match:
      severity: p0
      source: pt_audit
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.2: pt_audit aggregates 1 message per audit run (5 checks 合并). dedup_key
      # 用 summary:{trade_date} 与 batch 3.1 data_quality 模式一致, 防 schtask 风暴.
      # 旧 {check}:{trade_date} 设计需 5 message 拆, 与 send_aggregated_alert 1 message
      # 行为不符.
      dedup_key_template: "pt_audit:summary:{trade_date}"

  - name: p1_pt_audit_findings
    match:
      severity: p1
      source: pt_audit
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "pt_audit:summary:{trade_date}"

  - name: p2_pt_audit_findings
    match:
      severity: p2
      source: pt_audit
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "pt_audit:summary:{trade_date}"

  # ────────────── P1 因子 / 健康 ──────────────
  - name: p1_factor_lifecycle_warning
    match:
      severity: p1
      source: factor_lifecycle_monitor
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "factor_lifecycle:{factor}:{transition}"

  - name: p0_factor_health_decay
    match:
      severity: p0
      source: factor_health_daily
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.5: factor_health_daily 1 message per run (overall status 聚合).
      # summary:{trade_date} 与 batch 3.x 一致.
      dedup_key_template: "factor_health:summary:{trade_date}"

  - name: p1_factor_health_decay
    match:
      severity: p1
      source: factor_health_daily
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "factor_health:summary:{trade_date}"

  - name: p2_factor_health_decay
    match:
      severity: p2
      source: factor_health_daily
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "factor_health:summary:{trade_date}"

  - name: p1_pt_daily_summary
    match:
      severity: p1
      source: pt_daily_summary
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "pt_daily_summary:{trade_date}"

  - name: p0_pt_watchdog_stale
    match:
      severity: p0
      source: pt_watchdog
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.4: pt_watchdog send_alert 全 P0 (PT 真金链路异常). 1 message per
      # script run, summary dedup 与 batch 3.x 一致, 防同日多次空跑风暴.
      dedup_key_template: "pt_watchdog:summary:{trade_date}"

  # reserved: pt_watchdog 当前所有 send_alert 走 _send_alert_via_platform_sdk 固定
  # Severity.P0 (PT 真金链路异常). 此 P1 规则是 forward-compat 占位, 防未来加 P1
  # 检测 (e.g. PT 心跳延迟非异常但需观察) 时缺规则. P3 batch 3.4 reviewer 标记.
  - name: p1_pt_watchdog_stale
    match:
      severity: p1
      source: pt_watchdog
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "pt_watchdog:summary:{trade_date}"

  - name: p0_ic_monitor_reversal
    match:
      severity: p0
      source: ic_monitor
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.3: ic_monitor 1 message per run (multiple factor alerts 聚合).
      # summary:{trade_date} 与 batch 3.1/3.2 模式一致, 防同日多次空跑风暴.
      dedup_key_template: "ic_monitor:summary:{trade_date}"

  - name: p1_ic_monitor_drop
    match:
      severity: p1
      source: ic_monitor
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "ic_monitor:summary:{trade_date}"

  - name: p0_monitor_factor_ic_retired
    match:
      severity: p0
      source: monitor_factor_ic
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.3: 因子生命周期 (retired = P0 严重衰减) 1 message per run.
      dedup_key_template: "monitor_factor_ic:summary:{trade_date}"

  - name: p1_monitor_factor_ic_warning
    match:
      severity: p1
      source: monitor_factor_ic
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "monitor_factor_ic:summary:{trade_date}"

  - name: info_monitor_factor_ic_health
    match:
      severity: info
      source: monitor_factor_ic
    action:
      channels: [dingtalk]
      suppress_minutes: 1440  # 24h, 健康播报 daily 1 次足够
      # P2.1 reviewer 采纳: 不能与 P0/P1 共享 summary 键 — INFO 1440min suppress 会
      # 毒化同日 P0 retired 告警 (dedup 命中 INFO 已写的 row, 真金 P0 silent 24h).
      # 用独立 health 命名空间隔离, P0/P1 走 summary 命名空间.
      dedup_key_template: "monitor_factor_ic:health:{trade_date}"

  - name: p0_daily_reconciliation_drift
    match:
      severity: p0
      source: daily_reconciliation
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.5: daily_reconciliation 1 message per run, 3 callers (QMT 失败 P0
      # / 严重差异 P0 / 一般差异 P1) 共享 summary 键, 防同日多次空跑风暴.
      dedup_key_template: "daily_reconciliation:summary:{trade_date}"

  - name: p1_daily_reconciliation_drift
    match:
      severity: p1
      source: daily_reconciliation
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "daily_reconciliation:summary:{trade_date}"

  # ────────────── P0 数据/备份链路 (batch 3.7) ──────────────
  - name: p0_pull_moneyflow_data_delay
    match:
      severity: p0
      source: pull_moneyflow
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.7: pull_moneyflow 17:30 schtask, MAX_RETRY 次后空数据 P0 告警.
      # 1 schtask run 内可能多日数据 (catch-up backfill), 但同 trade_date 重试集中
      # → summary:{trade_date} 防同日重复告警轰炸.
      dedup_key_template: "pull_moneyflow:summary:{trade_date}"

  - name: p0_pg_backup_failed
    match:
      severity: p0
      source: pg_backup
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.7: pg_backup 4 callers (timeout / dump fail / file missing / size
      # 偏小) 共享 summary 键. DR 链路 P0, suppress 5min 防同次 backup 多次告警.
      dedup_key_template: "pg_backup:summary:{trade_date}"

  # ────────────── P0 services_healthcheck (LL-074 + LL-081) ──────────────
  # batch 3.6 code-reviewer P2.1 采纳: 删除 p2_services_healthcheck_degraded 死规则
  # (services_healthcheck SDK 路径 hardcoded Severity.P0, 无 P2 fire path 永远不匹配).
  - name: p0_services_healthcheck_critical
    match:
      severity: p0
      source: services_healthcheck
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      # batch 3.6: services_healthcheck 自带 file-state dedup
      # (logs/services_healthcheck_state.json), PG 层只防 cross-process 重复触发.
      # status (ok / degraded) 进 dedup_key 让状态转移 (degraded → ok recovery /
      # ok → degraded transition) 不被 5min suppress 阻塞 — 状态机告警与 batch
      # 3.x summary 模式略偏离, 因 services_healthcheck 是状态机类告警 (非 daily
      # summary), 状态转移信号必须保留. trade_date 防同日重复, status 防同状态再 fire.
      dedup_key_template: "services_healthcheck:{status}:{trade_date}"

  # ────────────── P1 / P2 rolling_wf (月度策略验证) ──────────────
  # batch 3.6 code-reviewer P2.3 采纳: rolling_wf P1+P2 规则提至独立 section
  # (避免与 P2 研究/GP 区混淆).
  - name: p1_rolling_wf_regression
    match:
      severity: p1
      source: rolling_wf
    action:
      channels: [dingtalk]
      suppress_minutes: 1440  # 24h, 月度任务 (1st of month 02:00) dedup 24h 安全
      # batch 3.6: rolling_wf 1st of month 02:00 触发, 1 message per run
      # (P1=ALERT >30% Sharpe 下降 / WARN=15-30% 下降 → SDK Severity.P2).
      # summary:{trade_date} 与 batch 3.x 模式一致.
      dedup_key_template: "rolling_wf:summary:{trade_date}"

  - name: p2_rolling_wf_regression
    match:
      severity: p2
      source: rolling_wf
    action:
      channels: [dingtalk]
      suppress_minutes: 1440  # 24h, 月度任务 dedup
      dedup_key_template: "rolling_wf:summary:{trade_date}"

  # ────────────── P2 研究 / GP / 长任务 ──────────────
  - name: p2_gp_pipeline_failed
    match:
      severity: p2
      source: run_gp_pipeline
    action:
      channels: [dingtalk]
      suppress_minutes: 1440
      dedup_key_template: "gp_pipeline:{phase}:{exception_type}"

  # ────────────── 通配 fallback (按 severity 兜底) ──────────────
  - name: catchall_p0
    match:
      severity: p0
    action:
      channels: [dingtalk]
      suppress_minutes: 5
      dedup_key_template: "catchall:{source}:p0"

  - name: catchall_p1
    match:
      severity: p1
    action:
      channels: [dingtalk]
      suppress_minutes: 30
      dedup_key_template: "catchall:{source}:p1"

  - name: catchall_p2
    match:
      severity: p2
    action:
      channels: [dingtalk]
      suppress_minutes: 60
      dedup_key_template: "catchall:{source}:p2"
