#   - ADR-036 (BULL_AGENT V4-Flash → V4-Pro mapping, debate reasoning capability)
#   - ADR-064 (Plan v0.2 D2 sustained, V4-Pro 路由层 confirmed via router.py TASK_TO_MODEL_ALIAS)
